  <title>2024 Contribution Graph – "Vibe Code"</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 20px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #8b949e;
    }
    .profile-header strong { color: #e6edf3; font-size: 16px; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      width: max-content;
      max-width: 100%;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .card-header h2 {
      font-size: 14px;
      font-weight: 400;
      color: #e6edf3;
    }
    .card-header span { color: #8b949e; }
    .graph-wrap { overflow-x: auto; }
    .graph {
      display: grid;
      grid-template-columns: 32px repeat(53, 13px);
      grid-template-rows: 18px repeat(7, 13px);
      row-gap: 3px;
      column-gap: 3px;
      width: max-content;
    }
    .month-label {
      font-size: 11px;
      color: #8b949e;
      grid-row: 1;
      align-self: end;
      white-space: nowrap;
    }
    .day-label {
      font-size: 11px;
      color: #8b949e;
      grid-column: 1;
      align-self: center;
      text-align: right;
      padding-right: 8px;
      line-height: 13px;
    }
    .cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      cursor: default;
      position: relative;
    }
    .cell.empty { background: transparent; pointer-events: none; }
    .cell.off { background: #21262d; }
    .cell.on  { background: #39d353; }
    /* Tooltip */
    .cell:not(.empty):hover::before {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1c2128;
      border: 1px solid #444c56;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      white-space: nowrap;
      color: #e6edf3;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }
    .legend {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      justify-content: flex-end;
      font-size: 11px;
      color: #8b949e;
    }
    .legend-cell {
      width: 11px; height: 11px; border-radius: 2px;
    }
  </style>
</head>

        el.className = 'day-label';

        el.style.gridRow = (row + 2).toString();
        graph.appendChild(el);
      }

    // Cells
    for (let col = 0; col < weeks.length; col++) {
      for (let row = 0; row < 7; row++) {
        const day = weeks[col][row];
        const el = document.createElement('div');
        el.className = 'cell';
        if (!day.inYear) {
          el.classList.add('empty');
        } else if (day.active) {
          el.classList.add('on');
          el.setAttribute('data-tip', '1 contribution on Vibe Code banner — ' + day.date);

          el.classList.add('off');
          el.setAttribute('data-tip', 'No contributions on ' + day.date);
